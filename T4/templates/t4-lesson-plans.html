    content:`SOURCE: Ben's notes from Wangchannoi session — lesson plan basis

KEY CONCEPTS:

- Skip Back (not slide): Skip = speed + ability to adjust. If wrong: change stance and skip again. Slide = no adjustment.

Segment 1 (5 min): Skip rope / tire jumping warmup, no hands

5) Head Dives: Quick duck and tackle. Changing of levels, fake, body attack, or hidden head kick. Closes distance.

Palm Catch on Kick: Dissipate power AND gain control of caught leg. Meeting kick on impact.

Arm Hook on Parry: Doesn't slap the guard — hooks the forearm with palm/wrist, Scorpion-style "Get over here!", yanks them into his elbow.

Air-Kick Defense: When your kick is caught, do a secondary "air kick" as leg is being thrown. You stay put. Doesn't matter how hard they spin — air kick cancels it. Total control of your own leg.

CHATCHAI'S JAB: Rotate front foot on ball, twist heel out like a left hook. Jab comes out with hip and shoulder in alignment. Weight stays or shifts to BACK foot. Back foot, knee, hip, shoulder all aligned. Front side lined up like final position of a left hook but with arm straight.

OFF THE JAB: Weight on back leg → shift to front foot, pivot on ball of back foot, drive hip and shoulder → cross. Front side: foot, knee, hip, shoulder in a line.

THE HOOK: Step out and forward with back foot, shift ALL weight over and across as hook follows the knee-hip-shoulder line.

THE EUREKA: Weight shifts to OPPOSITE side from the punch. Most people do the opposite — jabbing with weight on front foot. Tiny correction felt huge.

1) Low Kick as Punishment: Catches you with leg kick as you come off a strike. Weight coming back down → opponent can't protect himself. Pavlovian — you start to hate your own strikes.
2) Pivots and Shins: Strong pivot around standing leg, ball of foot swivels. Kicking leg is all one piece, no hinging. Digs into IT Band and back of thigh with shin.
3) Standing In and Dern: Insists all fighters come forward. Never backwards. Angles off rather than stands still.
4) Reverse Elbow: Uses overturn from clinch slip to spin all the way around for an elbow. Acts like being defeated — then SLAM.
5) Using Confidence Against You: Lets a few strong teeps land → melts off the third → counters with leg kick. First two build confidence, third one ends them.
6) Pushing Forward for Leg Kicks: Marches opponent backward gently, then lands kicks to legs while they're in reverse.
8) Stop Kick/Knee with Heel of Hand: Pat opponent's kick/knee at close range with hand and pivot off. Can hurt their thigh.`

    subtitle:"Painful defense, low kick destroyer, catching kicks",
    content:`TRAINER: Bluksek "Kru Noi" Sityodtong — Sityodtong gym (oldest in Pattaya, home of Master Yodtong). Taught 7 years in Singapore.
SCHOOL OF THOUGHT: Painful defense — not nullifying a point but causing damage. Got a kicker? Hurt them on kicks and they'll stop by themselves.

Elbow Counter on Kicks: Step just inside kick, land elbow (not hook). Timing first — step cuts off trajectory. Land close to standing leg to get elbow on jaw.

Watching the Legs: Watch legs not the strike. Legs are faster indicator than the strike itself. Right foot stepping = carrying left knee. Follow the step, meet it with your elbow.

Low Kick Destroyer: Instead of checking, tuck heel to butt like a knee and jam it into oncoming kick. Nasty, fast, hurts them alone. Land off that with a cross knee to same leg.

Elbows on a Punch: Step toward oncoming punch and interrupt with elbows. Damages their arm, sets up back elbow.

Catching Kicks — 2 Options:
Option 1: 45-degree angle toward their standing leg. Snatch around knee, pivot hard — they spin and spin.
Option 2: Stand ground, check kick, pin their leg on your own shin — throw their leg and spin them. "Not hurt!"

Clinch: Always swim inside. Push face to create space to swim inside again. 50/50 — but turns are finishers.`

    subtitle:"Bi-directional power, forcefield, jangwa 2 and chon",
    content:`TRAINER: Chamuakpet Hapalang — 17 years National Stadia. One of 3 Kings of Muay Khao (with Dieselnoi and Panomtuanlek). "Mr. Computer Knee."

1) Teep for All Styles: Not just a Femeu weapon. Short, powerful, piston-like. Offense, defense, off-balancing.
2) Bi-Directional Power: Charge of power shoots DOWN into ground with standing foot AND simultaneously UP or OUT. Like lightning connecting sky to earth.
3) Standing Leg and Ruup: Because of bi-directional power, standing leg = paramount. Alignment foot→knee→hip→shoulder→head = perfect balance and pillar of power.
4) Up the Middle: Economy of movement, almost invisible. No visible rotation of hips or shoulders. Strikes all up the middle: teep, straight knee, inside elbows.
5) Forcefield: Never reaches beyond perfect balance range. Like a mime in an invisible box. Opponents run into this forcefield.
6) Jangwa 2 and Chon: Counter fighter = "second rhythm." Half-beat behind — striking and interrupting nearly simultaneous, but beating them by just a little. Creates CHON — a crash. The forcefield is what opponents run into.
7) Clinch Immediacy: Doesn't grab or lock. Strikes at grabbing range — rips, pulls, trips right as grab happens. Everything is a spoiling or counter upon contact.`

    content:`TRAINER: Detduang Por Pongsawang — Kru at PK Saenchai, fought all top Golden Age names. Short fighter, closing style.

1) Progression of Rounds: Uses padwork to progress offense→defense just like a 5-round Thai fight. Padwork informs how a fighter will fight.
2) Leg Kicks — Get the Lead Pipe: "Do damage" camp. Targets IT Band with center of shin. Chops very straight.
3) Weight Transfer: Not explicitly instructed but clearly illustrated — how he transfers weight off defensive moves to land counters.
4) Body Cross from Longer: Body punches are longer in Muay Thai (elbows and knees force distance). Long body punch to diaphragm, head doesn't come forward.
5) Short Range Spear Knee: Opponent pushes hips in to stifle knees — tuck knee straight up between you and fold them over it. Then step back for straight knee to face.
6) Matador as In-Fighter: Even forward fighters can be the matador — cutting angles while staying close, pivoting, parrying to maintain position.
7) Take a Beat: First from Kru Khorat. "Fast" = explosive with room to breathe, not minimizing time between movements. Catch a kick, hold it, pause — THEN execute. Doesn't spoil the counter by rushing.`

const sections = [
  { type:"wcs",      label:"WCS Own Curriculum" },
  { type:"sylvie",   label:"Sylvie Library Notes" },
  { type:"belt",     label:"Belt Requirements" },
  { type:"external", label:"External Curriculum" },
  { type:"combo",    label:"Combos & Drills" }
];

let activeFilter = 'all';

function setFilter(type) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-type="${type}"]`).classList.add('active');
  filterDocs();
}

function filterDocs() {
  const q = document.getElementById('search').value.toLowerCase();
  let visible = 0;
  document.querySelectorAll('.doc-item').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const doc = docs[idx];
    const matchType = activeFilter === 'all' || doc.type === activeFilter;
    const matchText = !q || doc.title.toLowerCase().includes(q) || doc.content.toLowerCase().includes(q);
    const show = matchType && matchText;
    el.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  // Hide empty section headers
  document.querySelectorAll('.sidebar-section').forEach(sec => {
    const hasVisible = [...sec.querySelectorAll('.doc-item')].some(el => !el.classList.contains('hidden'));
    sec.style.display = hasVisible ? '' : 'none';
  });
  document.getElementById('visibleCount').textContent = `${visible} shown`;
}

function showDoc(idx) {
  const doc = docs[idx];
  document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.doc-item')[idx].classList.add('active');
  document.getElementById('content').innerHTML = `
    <div class="content-title ${doc.type}">${doc.title}</div>
    <div class="content-meta"><span class="doc-tag ${doc.type}">${sections.find(s=>s.type===doc.type).label}</span> &nbsp; ${doc.subtitle}</div>
    <div class="content-body">${doc.content}</div>
  `;
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = sections.map(sec => {
    const secDocs = docs.map((d, i) => ({...d, idx:i})).filter(d => d.type === sec.type);
    return `<div class="sidebar-section">
      <div class="sidebar-section-header ${sec.type}">${sec.label} (${secDocs.length})</div>
      ${secDocs.map(d => `
        <div class="doc-item" data-idx="${d.idx}" onclick="showDoc(${d.idx})">
          <div class="doc-title">${d.title}</div>
          <span class="doc-tag ${d.type}">${sec.label}</span>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

buildSidebar();
document.getElementById('headerCount').textContent = `${docs.length} documents`;
</script>
