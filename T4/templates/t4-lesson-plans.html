    title: "Wangchannoi #93 — Simple Class Structure (Counter Fighting)",
    type: "lesson",
    content: `MONDAY: MUAY THAI

Counter Fighting – Step With Every Strike & Disrupt Their Frame

(You already have your standard warm-up sequence – not included here.)

Partner Drills: Gloves

Round 1 (4 Min) – Step with Every Punch
Partners go 4-for-4, trading single strikes with step:
- Jab with step
- Cross with step
- Lead uppercut with step
- Hook with diagonal step forward and pivot rear foot to recover stance

Focus: "Like stepping off a curb." Foot and punch land together. Head stays over hips, no ducking or leaning.

Round 2 (4 Min) – Unified Body Mechanics
Partners go 4-for-4:
- Jab – ensure shoulder touches jaw
- Cross – shoulder brushes jaw
- Lead uppercut – load hook
- Hook – elbow stays low, no turning over

Focus: Head stays straight. No side-to-side. No squatting. Everything drives forward, unified.

Round 3 (4 Min) – Disrupting Frame
Partners go 4-for-4:
- Jab + lead uppercut + hook
- Jab + hook to neck
- Lead uppercut + hook to collarbone
- Cross + hook to ear

Goal: Make them step back. Hit the neck or collarbone to break posture. Talk about making them reset.

Round 4 (4 Min) – Defense with Hands and Elbows
Partners go 4-for-4 (one attacks, one defends):
- Bat straight punches (short chop deflections)
- Shunt block lead hook
- Elbow block uppercut
- Shunt + elbow block cross

Focus: No leaning. No distance defense. Defense creates the next strike.

Round 5 (4 Min) – Counter Fighting Flow
Pad holder feeds sequence, striker responds:
- Block jab (bat) → step + cross
- Shunt block lead hook → jam forearm to neck → rear roundhouse
- Bat cross → lead uppercut + cross
- Elbow block uppercut → pivot + cross/hook

Focus: Punch as foot lands. Every strike has weight. Disrupt their balance.

Round 6 (4 Min) – Off-Balancing After Catch or Block
- Catch teep → push-pull-push → rear kick
- Shunt hook → step forward → jam → cross
- Catch jab → yank shoulder off-line → roundhouse
- Catch body kick → shove → cross + lead knee`

    type: "lesson",
    content: `Wangchannoi Sor Palangchai. Lesson1

Class: 60 minutes. First 5 min stretching/warmup. Last 5 min burnouts with weights.

CORE TECHNIQUES & PRINCIPLES:

Go light at first — warm up, become good partners.

Stepping with every punch: Uppercut. Jab. Cross. Hook. On the hook step diagonally forward. Then pivot your rear foot back into a good balanced position. Set the hook up with some uppercuts. Aim for neck and ear. Use the lead uppercut to setup hooks and crosses. Don't turn the elbow over on the hook.

Goal: Hit them hard enough to disrupt their balance. Make them step back. Interrupt the series of punches they want to throw. Break their frame. After shunt block: roundhouse, knee, elbow, or cross.

Defense without distance: Don't use distance for defense. Deflect punches using little chopping turning motions with your hands. This can make their punch go across their own body — then throw a counter roundhouse. If punch is straight: bat it. If hook: shunt.

Drill each separately. Then drill together.

3rd component: Blocking punches using your elbows combined with a shunt-type rotating block. Uppercuts can be blocked with elbows or by turning hand palm-down to catch it.

Putting it all together: Block jab and cross with shunts and elbows. Disrupt the 3rd punch (the hook) with the step-straight-arm combined with a shunt. After the shunt: roundhouse, elbow, or cross.

KEY PRINCIPLES FROM THE SESSION:

1) Countering a lead hook: Step forward and jam opponent with a stiff forearm to the neck or collarbone while tight shunt blocking.

1a) Step on EVERY SINGLE STRIKE. All of them. Like stepping off a curb — whole weight coming forward, sometimes quite long — but head stays over hip and shoulder. Never dive the head beyond the foot.

2) The head comes forward: on jab or cross your head comes forward (never beyond the foot) but it's STRAIGHT. Don't let head go side to side — kills power. Don't squat into legs — kills power. Right shoulder should touch right jaw, head stays straight.

3) Block with your elbows.

4) Off-Balance (Sia Lak): Ruin your opponent's balance. Punch through someone so their counter kick is spoiled and second attack is ensured. Catch a teep → push, pull, push again → kick their head off.

5) Target the Neck: Top of head is bone — don't bother. Jaw has nerves but can be protected. The neck has all the nerves and all the weakness of a slack jaw. Target that.

6) Counter (Jang-wa Song): He comes forward, pressures, knocks opponents back. But let opponent go first and wait. "Be slow, jai yen yen, but hit hard."

7) The Order of Things: Rounds 1-2 = lower strikes, body punches, leg kicks. Hurt them and tire them. Make them slow. Rounds 3-5 = scoring.`

    content: `Wangchannoi Sor Palangchai. #93 Lesson1 Counter Fighting

60-minute class. First 5 min warmup. Last 5 min burnouts.

PRINCIPLE INTRODUCTION:
Counter-attacks, stepping with strikes, maintaining balance, targeting vulnerable areas, and pacing a fight.

Counter-attacks disrupt an opponent's offensive momentum, turning their strikes into opportunities. Stepping with each strike = stepping off a small curb, bringing whole bodyweight forward, increasing power. Balance is crucial for defense, evasion, power, and accurate strikes. The neck is vulnerable — less muscular and bony protection than head or torso. Pace a fight: rounds 1-2 are lower strikes, 3-5 are scoring.

STEPPING WITH EVERY STRIKE:
Students practice stepping forward on each strike. Whole bodyweight into the strike. Control is essential — maintain balance and be ready for the next movement.

MAINTAINING A STRAIGHT HEAD:
A straight head = balance and focus. Straight head aligned with spine protects the chin. Practice forward movements keeping head straight without throwing strikes.

DRILL 1 — Countering a Lead Hook:
In pairs. One student throws a lead hook, the other counters by stepping forward and jamming a stiff forearm into partner's neck or collarbone. Forearm jam serves as both block and strike — defense immediately becomes offense.

DRILL 2 — Unified Body Movement and Cross Technique:
Practice throwing crosses so shoulder brushes jaw. Ensures head stays straight, body unified behind the punch, maximizing power.

DRILL 3 & 4 — Blocking with Elbows, Shunt Blocks, Off-Balancing:
Practice blocking strikes using elbows. Incorporate shunt-type blocks to deflect incoming attacks. After catching partner's teep, practice off-balancing: push-pull-push to disrupt their stance.

TARGETING THE NECK:
Neck lacks muscular and bony protection of head and body. Susceptible to strikes that end fights. Practice slow, controlled strikes to neck area.

TIMED LESSON PLAN:

00:00–05:00 — Warmup and Stretching
Neck circles, shoulder circles, arm swings, leg swings, ankle rolls.

05:01–10:00 — Introduction and Stepping with Every Strike
Introduce core principles. Highlight stepping with every strike — like stepping off a small curb, full weight forward, power amplified.

10:01–15:00 — Drill 1: Stepping with Strikes
Pairs practice stepping into strikes. Maintain balance, heads aligned over hips and shoulders.

15:01–20:00 — Head Position and Unified Body Movement
Keep head straight for balance, accuracy, power. Unified body = maximum power transfer on the cross.

20:01–30:00 — Drill 2: Unified Body Movement with Crosses
Pairs practice crosses — shoulder brushes jaw = straight head, full body power.

30:01–35:00 — Elbow Blocking and Shunt Blocks
Use elbows to block incoming strikes. Shunt-type blocks deflect punches. Solid defense sets up counter-strikes.

35:01–45:00 — Drill 3: Elbow Blocking and Shunt Blocks
One throws punches, other practices blocks. Focus on timing and positioning.

45:01–50:00 — Off-Balance (Sia Lak) Techniques
Off-balance opponent to disrupt rhythm and create openings. After catching teep: push-pull-push sequence.

50:01–55:00 — Drill 4: Off-Balance Techniques
Pairs alternate roles — executing and defending against off-balance tactics.

55:01–60:00 — Burnout Session
Kettlebell swings (20 reps), goblet squats (30 sec), push press (30 sec per arm).`

    title: "#132 Matee Jedeepitak — Femeu Timing & Distance (Lesson Plan)",
    type: "lesson",
    content: `#132 Matee Jedeepitak - The Keys To Femeu Timing & Distance (1 hr, 6 min)

Core principle triad: TIMING, DISTANCE, BASICS.

RAW NOTES:
1. Warm up drill — combo of skipping rope and tire jumping. Helps find rhythm and timing. Don't throw hands at first. Then add hands. Hands should land at the same time as the feet.

2. Skip Back countering. Pretend tire jumping = jumping over a large tire in a "U" shape. Skip Back a couple times. Quickly launch rear leg after briefly touching for roundhouse. Can also be a teep or a knee (long weapons). Don't slide. Skip. Wait until they throw a weapon to do it.

Explains why it's a skip not a slide: if you are wrong you can change stance and skip again instead of launching the kick. The transition of change = same as the skip back but you slow down a little bit and let the front foot slide to the rear before it quickly launches.

Drill: Skip back and switch stances. When you switch stance either throw a switch kick or a cross. Or skip back again and throw the other side roundhouse.

Walking backward alternate steps. Choose a leg you are going to kick with. Step back. Touch, launch off the ground.

KEY TEACHING POINTS FROM SYLVIE'S NOTES:

Timing: Footwork exercise is his standard warmup — bouncing on a tire or skipping rope — can add punches to land at same time as feet.

Skip Back/Walk Back: Ideal for counter striking. "Skip" is a much considered word — not the same as a jump or a slide. Skip allows speed, ability to make quick adjustment, create more space or pivot if needed.

Momentum: Weight and balance. Necessary for maintaining distance while moving forward or backward.

Countering > Blocking: Matee prefers a counter to a block — difference between opponent's timing (blocking) or "my timing" (countering).

Not Rotating the Shoulders: Keep shoulders still and rotate only the torso for power. Feet can switch stance and change direction without giving away intentions. Invisibility. Rotating shoulders slows you down and over-commits you.

Trampoline Floor: Same "springboard" floor as Karuhat — foot tapping down and springing up with incredible speed to land counter strikes against an advancing opponent.

STRUCTURED CLASS:

Segment 1 (5 min) — Warm-Up
Skipping rope or pretend tire jumping. Find rhythm and timing without focusing on hands. Don't turn body. Find your timing.

Segment 2 (5 min) — Adding Punches to Warm-Up
Add punches — land at same time as feet. Sync punches with footwork.

Segment 3 (5 min) — Skip Back Countering
Explain difference between skipping and sliding. Skip back rather than slide. Quickly launch rear leg roundhouse, teep, or knee.

Segment 4 (10 min) — Skip Back with Stance Switch
Integrate stance switch. Skip back → change stance → throw switch kick or cross. Or skip back again and throw other side roundhouse. Focus on smoothness and speed of transitions.

Segment 5 (15 min) — Skip vs Slide and Stance Switching
Explanation (3 min): Skip = speed + ability to adjust. Slide = limits options.
Skip Back Drill (4 min): Start in fighting stance, skip back quickly as if evading strike. Can change stance and skip again if wrong.
Stance Switch Drill (4 min): Add stance switch to the skip. Slow down slightly, let front foot slide to rear before launching next move.
Skip Back, Switch, and Strike (4 min): Add counter-strike after stance switch — switch kick, cross, or other-side roundhouse.

Segment 6 (10 min) — Backward Walking with Counter
Walking backward using alternate steps. Choose one leg for counter-kick. Step back, lightly touch ground, launch kick immediately. Quick footwork and timing.

BURNOUT:
Leg strengthening: mini dips with weights under heels. Start at 50-100, work to 500.
Neck strengthening: weight held by towel, perform lifts.
Weighted shadow boxing: small weights each hand.
Bouncing knee to chest.
Partner hop-and-scramble drill (10 reps, switch).
Final: bounce, high knee, clap hands under raised knee.
Kettlebell swings (30 sec), goblet squats (30 sec), push press (30 sec per arm).`

    content: `#65 Namsaknoi Yudthagarngamtorn 1 - Sharking The Angles (67 min)
Jul 4, 2019

Fighter of the Year 1996. 6 years undefeated as Lumpinee Champion.

Playful but when you feel him shift from evasiveness to "I'm just going to stand right here," you don't feel like he's so nice anymore.

WHAT TO LOOK FOR:

1) His Stance: Watch his legs. Broader stance than Karuhat — uses this to pace outside of his opponent's stance all the time. Able to cut off the ring, corral the opponent, slip to the side, throw a strike you didn't see — all from always staying outside the opponent's stance.

2) Switch-Step Punches: Namsaknoi gallops with a switch step to turn his jab into a cross. Uses this as a slip to an opponent's jab, or just to get to the outside and land a strike any time. If opponent doesn't go backwards, use this as a clinch grab.

3) Off-Line: General technique of getting "off-line" with what looks like a stagger step that's either lateral (slipping the jab and throwing a headkick) or 45 degrees to the outside of opponent's foot for a strike.

4) The Juggernaut: Slips to the outside like a standard boxer's slip, then reverses direction and body-checks with that front shoulder.

5) Head Dives: Quick duck down and tackle. Changing of levels, a fake, a body attack, or a hidden headkick. Uses it to close distance.

6) Strategic Change of Direction: Brilliant at pushing in one direction and then immediately reversing. Goes backwards then does the head dive and is past you. Or starts going right then flips left.

7) "Good Idea/Bad Idea": Whole program of letting opponent think they've made a good decision, which turns out to be a bad decision. Lets them land a strike — "if they can do it, they will do it again" — but then has a solution. Lets them do it one extra time so they can pat themselves on the back and maybe throw themselves into it harder. To their peril.`

    type: "notes",
    content: `#39 Khorat Saknarin - Precise Tensions (97 min)
May 11, 2018

Style: Slick, powerful, aggressive. Insisted on looking opponent in the eye as focal point — from which you can get a full sight picture. Strategic and evasive, but aggressive and powerful.

KEY TECHNIQUES:

Palm Catch on a Kicked Leg: Using palm of hand to dissipate power on a caught kick. Interrupting the kick on impact. Effective at dissipating power AND gives a lot of control of the caught leg for counters.

Parry, Pause, Then Kick: Huge realization. Parry an arm or punch, step over and kick as opponent is stopped or "matadored" to the side. The fix: just take a split second to let the parry sink in before throwing the kick. They're individual, precise, distinct. Not stopping — pausing for emphasis. (Khorat called the muddy version "muay mua" — indistinct movements.)

Arm Hook on a Parry: Khorat doesn't just slap the guard down — he uses palm or wrist to HOOK the forearm, Scorpion-style "Get over here!", yanking opponent into his elbow.

Air-Kick Defense: When your kick is caught, do a secondary "air kick" as the leg is being thrown and it keeps you from spinning, almost at all. Doesn't matter how hard opponent spins you — if you air kick as they try, you stay put. Total control of your own leg without tensing up. Mind-blowing.

Tension + Looseness: Appears to have insanely tense energy — cuts through everything. But hidden looseness in his darting, evasive maneuvers. Puts his face forward and stares into your eyes to get you to try to punch him, then darts away and counters hard. You can't accomplish the get-out-of-the-way part if you're truly tense. Tense in the right places, loose enough to move really fast.

TEACHING STYLE: Moved through technique demonstrations so quickly. Never ran out. Wealth of knowledge might never be exhausted.`

    title: "#14 Chatchai Sasakul — Perfecting Hands",
    type: "notes",
    content: `#14 Chatchai Sasakul 1 - Perfecting Hands (106 min)
Apr 19, 2017

Former WBC World Boxing Champion (1997). Best Coach in Thailand (2007). Began as Petchyindee Muay Thai fighter.

CORE INSIGHT: Great fighters aren't doing anything fancy. They're doing the same moves as an amateur — just really, really well. What drives Sylvie crazy about Chatchai's movements: BALANCE. His balance is unreal.

Footwork allows the punches — not the other way around.

FIRST HOUR — Weight Transfer on Punches:

Chatchai's Jab: Rotate front foot on the ball, twisting the heel out like a left hook. Jab comes straight out with hip and shoulder twisting in perfect alignment, weight staying or shifting to the BACK foot. From a distance — back foot, knee, hip and shoulder are perfectly aligned. Front side also lined up like final position of a left hook, but with front arm straight.

Off the Jab: Weight on back leg → shift weight onto front foot while pivoting on ball of back foot, driving hip and shoulder → right cross. Front side: foot, knee, hip and shoulder all in a line.

The Hook: Step out and a bit forward with back foot, shifting ALL weight over and across as hook follows in line with knee, hip and shoulder. Balanced, effortlessly powerful.

The Eureka Moment: Weight shifts onto OPPOSITE side from the punch. Most people do exactly the opposite — jabbing with weight on front foot, cross on front foot, hook on front foot. The common version causes a slight lean. Tiny adjustment — fingers pulling shoulders more center — felt huge.

First Hour Summary:
- Bringing front leg out and twisting heel to side on jab
- Keeping weight on opposite foot from punch
- Angling hook somewhat downward to get around the guard
- Keeping cross and uppercut closer to body, elbows to ribs
- Footwork connected to weight transfer
- Speed comes from slowing down + accuracy
- "Head movement" and how to train it
- Training to FEEL the correct movements

SECOND HOUR — Jab and Cross Focus:

Really keeping weight on back foot for the jab. Tapping back foot on the cross to flow into step-out for a hook. Smooth transitions between punches — not throwing everything individually, flowing between them. Using twist of shoulders for real power, speed, fluidity. Footwork — when to punch and when to pivot.`

    type: "notes",
    content: `#103 Metprik Silachai - Lost Techniques of Old School Muay Maat Lowkick Pressure (81 min)
Mar 19, 2021

Bantamweight Lumpinee Champion 1970. 71 years old at filming. Responsible for raising Tongchai Tor Silachai (Fighter of the Year, 2001).

FOCUS: 20 minutes of slow-motion footage. Old school kicking style meant for close-range fighting combined with punches. Dieselnoi used a version of this close kick. Kongsamut in the Library shows how it was deployed in the Golden Age.

WHAT TO LOOK FOR:

1) Low Kick as Punishment: Catches you with a leg kick as you're coming off a strike. Pavlovian — you start to hate your own strikes because you're punished for them. Brilliant timing — weight is coming back down right as he strikes, so opponent can't really protect himself at all.

2) Pivots and Shins: Strong pivot around standing leg, ball of foot swivels. Kicking leg is all one piece — just a bend at knee, no "hinging." Digs into IT Band and around back of thigh with shin. Hurts.

3) Standing In and Dern: When asked whether to stand ground or come forward, insists all his fighters come forward. They don't ever go backwards. He angles off rather than standing still.

4) The Purpose of a Reverse Elbow: Uses the overturn from a slip in the clinch to spin all the way around for an elbow. Acts like he's being defeated — then SLAM, elbow.

5) Using Confidence Against You: Lets a few strong teeps land before melting off the third one and countering with a leg kick. First two landing allow opponent to feel confident and lean into the strike — then melts off and they're yours.

6) Pushing Forward for Leg Kicks: Pushed opponent backwards gently — just how you'd march an opponent back — then landed kicks to legs as they were in reverse.

7) Set Up and Follow Up: How he sets up leg kicks, how he follows up. Punches to close up opponent in their guard; counters; as opponent's leg comes back down from their own kick or block.

8) Stopping a Kick or Knee with Heel of Your Hand: Stop opponent's kick or knee at close range by patting it with your hand and pivoting off. Not strong or powerful but effective — can hurt their thigh if you dig in a bit.

NOTE: Karuhat also advising off-camera during session.`

    title: "#46 Bluksek Kru Noi Sityodtong — Internal Knees & Elbows",
    type: "notes",
    content: `#46 Bluksek "Kru Noi" Sityodtong - Internal Knees & Elbows (59 min)

Sityodtong — oldest gym in Pattaya. Home of Master Yodtong who produced the greatest number of champions in Thai history. Kru Noi taught there for years before teaching 7 years in Singapore — style adapted to Western students.

WHAT TO LOOK FOR:

Elbow Counter on Kicks: Step just inside someone's kick and land an elbow (not a hook like Chatchai teaches). About timing — stepping forward takes power out of kick by cutting off its trajectory. Land close to their standing leg to get the elbow right on their jaw. Timing first, power by proximity.

Watching the Legs: Watch legs (not the strike) — they're a faster indication of where the strike will be. If he's stepping with right foot, that's carrying his left knee. Follow the side of the step and meet it with your elbow. Super fast.

Low Kick Destroyer: Instead of checking the kick, tuck heel up to your butt the way you would for a knee and jam it right into opponent's oncoming kick. Nasty, fast, hurts opponent. Land off that block with a step → target same leg with a cross knee right after.

Elbows on a Punch: Step toward the oncoming long punch and interrupt it with your elbows. Hurts. Can do enough damage to the arm that later punches are less effective. Can land a wonderful back elbow off it.

Catching Kicks — 2 Options:
Option 1: Step at 45-degree angle toward opponent's standing leg. Snatch leg around knee, so close to standing leg that when you pivot hard they just spin. REVISION: Keep stepping away from kick and spin opponent until you can crush them.
Option 2: Stand your ground and check the kick. Pin other side of opponent's leg right on your own shin — throw their leg and spin them. "Not hurt!" Catching on shin doesn't take breath or hurt nearly as much as catching on ribs.

Clinch Tips: Always swim inside. If you can't get in — push the face (to create space, which allows you to swim inside again). "In Thailand, have to inside." Clinching is 50/50 — "you knee, I knee, you knee, I knee" — but the TURNS are what give bigger points and can win an otherwise even exchange. Turns aren't tricks — they're finishers.

SCHOOL OF THOUGHT — PAINFUL DEFENSE: Not just nullifying a point but causing pain and damage to opponent. Got a kicker? Hurt them on their kicks and they'll stop all by themselves. Knee to knee or shin to shin — you both hurt. Jam your knee into someone's thigh on a kick — they hurt alone.`

    type: "notes",
    content: `#139 Chamuakpet Hapalang 3 - Vertical Attack, Control of Space (95 min)
October 28

Truly one of the greatest fighters who ever fought. 17 years at the National Stadia. One of the 3 Kings of Muay Khao from Hapalang Gym (with Dieselnoi and Panomtuanlek). Called "Mr. Computer Knee" for his IQ in using knees. Lives and teaches in Japan.

WHAT TO LOOK FOR:

1) Teep is for All Styles: Tendency to associate teep as a Femeu weapon — but it's the equalizer. Fits all styles. Used offensively and defensively to off-balance and juggle, control timing and distance. Chamuakpet's teep is short, powerful, like a piston.

2) Bi-Directional Power: Total epiphany. The charge of power for any strike shoots DOWN into the ground with the standing foot, AND simultaneously shoots UP or OUT (depending on weapon) — like a lightning strike connecting sky to earth. Once you feel it, you know.

3) Standing Leg and Ruup: Because of bi-directional power, the standing leg becomes paramount — pillar to both power and balance. His alignment (Ruup) from foot to knee to hip to shoulder to head when on one foot = perfect balance and pillar of power.

4) Up the Middle: Because of his balance, can come up the middle with amazing speed and power. Economy of movement makes him almost invisible — doesn't betray movements via visible rotation of hips or shoulders. Strikes are all up the middle: teep, knee straight up, elbows on inside of opponent's guard.

5) Forcefield and Not Reaching: Balance thrown by unconscious desire to "reach" for the target. Teeps reaching, knees going forward — even a chest-jab was reaching slightly beyond perfect balance. Chamuakpet avoids this like a mime inside an invisible box — never breaking it. Within a forcefield, perfectly balanced, never reaches beyond its limit, never allows opponent to cross it.

6) Jangwa 2 and Chon: Counter fighter = "second rhythm" (jangwa song) — let opponent go first, interrupt their attack or block and counter. Chamuakpet is barely a half-beat behind — striking and interrupting nearly simultaneous to their strike, but beating them by just a little. This creates CHON — Thai word for a clash or crash (like a car crash). The forcefield is what opponents run into as they try to reach him.

7) Clinch Immediacy: Doesn't like to grab or lock in clinch. Would rather strike at grabbing range — rips, pulls, trips right as the grab is happening. Very fast and decisive — not changing positions or gaining dominant positions, but "striking" within grappling. Everything is a spoiling or counter upon contact.`

    title: "#138 Detduang Por Pongsawang — Close Range Counter Power",
    type: "notes",
    content: `#138 Detduang Por. Pongsawang - Close Range Counter Power (91 min)
October 2

Kru at PK Saenchai. Fought all top names of the Golden Age, contested for stadium belts several times. Powerful, closing style made for shorter fighters who don't want to be evasive. Principles for anyone who wants to stand in, especially for lowkick fighters.

WHAT TO LOOK FOR:

1) Progression of Rounds: Not explicitly stated — but illustrated clearly. Uses padwork to progress from offense and closing distance → defense and maintaining distance, just like a standard 5-round narratively scored fight in Thailand. Padwork informs how a fighter will fight. As a short fighter, how he uses defense within his offense to close distance and stay close is incredibly helpful.

2) Leg Kicks — Get the Lead Pipe: Different ways of throwing leg kicks. Detduang is in the "do damage" camp, not the stinging camp. Targets the IT Band with center of shin. Chops with kicking leg very straight.

3) Weight Transfer for Counters and Offense: How he transfers weight between feet and through torso off defensive moves to land counters and offensive strikes. Really efficient and powerful.

4) Body Cross from Longer: Body punches are longer in Muay Thai because of elbows and knees. Detduang's body punch is very long, aims at the diaphragm, doesn't bring head forward at all.

5) Short Range Spear Knee: When opponent pushes hips deeply toward you to stifle your knees — tuck knee straight up between the two of you and fold opponent over it. Once they're bent, step-back for a straight to face or chest.

6) Matador as an In-Fighter: Even forward fighters can be the matador. It's about cutting angles while staying close, pivoting, interrupting and parrying the opponent's guard to stay close.

7) Take a Beat: First taught by Kru Khorat. A lot of us rush without realizing it. We think being "fast" means minimizing time between our own movements rather than being explosive with room to breathe between explosions. Detduang will catch a kick, hold it, pause, "take a beat" before executing an off-balancing move and counter. Makes moves so legible. Makes sure you don't spoil the technique or power by rushing.`

3) Counters Inside the Opponent's Guard: Variety of options — but all of them involve allowing the opponent's strike to come, blocking in some way, and then destroying from inside that guard.

function getTypeLabel(type) {
  return type === 'lesson' ? 'Lesson Plan' : type === 'reference' ? 'Reference / Template' : 'Session Notes';
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = docs.map((doc, i) => `
    <div class="doc-item" data-id="${doc.id}" data-type="${doc.type}" onclick="showDoc(${i})">
      <div class="doc-title">${doc.title}</div>
      <div class="doc-type">${getTypeLabel(doc.type)}</div>
    </div>
  `).join('');
}

function showDoc(idx) {
  const doc = docs[idx];
  document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.doc-item')[idx].classList.add('active');
  document.getElementById('content').innerHTML = `
    <h2>${doc.title}</h2>
    <div class="meta">
      <span class="tag ${doc.type}">${getTypeLabel(doc.type)}</span>
    </div>
    <div class="body">${doc.content}</div>
  `;
}

function filterDocs() {
  const q = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;
  let visible = 0;
  document.querySelectorAll('.doc-item').forEach((el, i) => {
    const doc = docs[i];
    const matchText = doc.title.toLowerCase().includes(q) || doc.content.toLowerCase().includes(q);
    const matchType = !type || doc.type === type;
    const show = matchText && matchType;
    el.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('visibleCount').textContent = `${visible} documents`;
}

buildSidebar();
</script>
